                            <AngelFlightOverlay />
                            
                            <div className={`w-full max-w-5xl p-10 flex flex-col h-full overflow-hidden relative z-[70] transition-all duration-700 ${isPeekMode ? 'opacity-0' : ''}`}>
                                
                                <div className={`pb-6 border-b-2 border-dashed ${activeData.id === 'overview' ? 'border-slate-500/30' : activeData.border} shrink-0`}>
                                    <div className="flex items-center gap-6 mb-4">
                                        <div className={`p-4 rounded-2xl bg-gradient-to-br ${activeData.gradient} text-white shadow-xl ring-1 ring-white/20`}>
                                            {React.cloneElement(activeData.icon, { size: 32 })}
                                        </div>
                                        <div className="flex-1">
                                            <h2 className="text-5xl font-black text-white tracking-tighter uppercase italic leading-none">{activeData.title}</h2>
                                            <p className="text-xl text-slate-100 leading-snug font-bold italic tracking-tight mt-2 border-l-4 pl-4 border-slate-700">{activeData.concept}</p>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-2 px-5">
                                        <div className="flex items-center gap-2 mr-2 text-cyan-400/80">
                                            <Icon name="Users" size={14} />
                                            <span className="text-[10px] font-black uppercase tracking-[0.2em]">Spiritual Beings:</span>
                                        </div>
                                        {activeData.id === 'overview' ? (
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic mt-0.5">Beings distributed across specific architectural layers.</p>
                                        ) : (
                                            activeData.beings?.map((being, i) => (
                                                <button key={i} onClick={() => setSelectedBeing(being)}
                                                    className="group flex items-center gap-1.5 px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold text-slate-400 uppercase tracking-wider hover:bg-cyan-500/20 hover:text-cyan-100 transition-all">
                                                    <Icon name="Search" size={10} className="opacity-0 group-hover:opacity-100 transition-opacity" />
                                                    {being.name}
                                                </button>
                                            ))
                                        )}
                                    </div>
                                </div>

                                <div className="flex-1 py-6 overflow-y-auto custom-scrollbar pr-2">
                                    <div className="grid grid-cols-2 lg:grid-cols-3 gap-5">
                                        {activeData.verses.map((v, i) => (
                                            <ScriptureCard key={i} verse={v} bgDark={activeData.id === 'overview' ? 'bg-slate-900/60' : activeData.bgDark} border={activeData.id === 'overview' ? 'border-slate-500/30' : activeData.border} />
                                        ))}
                                    </div>
                                </div>

                                {/* Restored Engagement Inquiry Protocol (Questions) */}
                                <div className={`${activeData.id === 'overview' ? 'bg-slate-900/60 border-slate-500/20' : 'bg-slate-900/60 border-amber-500/20'} backdrop-blur-2xl border rounded-[32px] p-6 shadow-xl shrink-0 mt-6`}>
                                    <h5 className={`text-xs font-black ${activeData.id === 'overview' ? 'text-cyan-400' : 'text-amber-500'} tracking-[0.4em] uppercase mb-4 flex items-center gap-3`}>
                                        {activeData.id === 'overview' ? 'Foundational Exploration' : 'Engagement Inquiry Protocol'} 
                                        <div className={`h-px flex-1 ${activeData.id === 'overview' ? 'bg-cyan-500/10' : 'bg-amber-500/10'}`} />
                                    </h5>
                                    <div className="grid grid-cols-3 gap-6">
                                        {activeData.discussions.map((d, i) => (
                                            <div key={i} className="flex gap-4 group">
                                                <Icon name="MessageCircle" size={20} className={`shrink-0 mt-1 opacity-40 group-hover:opacity-100 transition-opacity ${activeData.id === 'overview' ? 'text-cyan-400' : 'text-amber-500'}`} />
                                                <p className="text-sm font-bold text-slate-300 leading-snug italic tracking-tight group-hover:text-white transition-colors">
                                                    {d}
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                            </div>
                        </section>

                        {/* Being Intelligence Dossier Modal */}
                        {selectedBeing && (
                            <div className="fixed inset-0 z-[300] bg-black/80 backdrop-blur-xl flex items-center justify-center p-8 animate-in fade-in duration-300">
                                <div className="bg-[#020617] border-2 border-cyan-500/30 rounded-[48px] p-10 max-w-2xl w-full relative max-h-[85vh] flex flex-col shadow-3xl overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1.5 bg-cyan-500/20 animate-scan pointer-events-none" />
                                    <button onClick={() => setSelectedBeing(null)} className="absolute top-8 right-8 p-3 bg-slate-900 rounded-full border border-white/10 text-white hover:bg-white hover:text-black transition-all">
                                        <Icon name="X" size={16} />
                                    </button>
                                    
                                    <div className="flex flex-col items-start mb-8 shrink-0">
                                        <div className="flex items-center gap-4 mb-4">
                                            <div className="p-4 bg-cyan-500/10 rounded-2xl border border-cyan-500/40">
                                                <Icon name="ShieldAlert" size={32} className="text-cyan-400" />
                                            </div>
                                            <div>
                                                <h2 className="text-4xl font-black text-white italic tracking-tighter uppercase leading-none">{selectedBeing.name}</h2>
                                                <p className="text-cyan-500/60 font-black tracking-[0.4em] uppercase text-[10px] mt-2">Intelligence Briefing // Record_ID_{selectedBeing.name.substring(0,3).toUpperCase()}</p>
                                            </div>
                                        </div>
                                        <div className="bg-cyan-500/5 border border-cyan-500/20 p-6 rounded-3xl w-full">
                                            <h4 className="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-2">Architectural Role & Context:</h4>
                                            <p className="text-slate-100 text-lg leading-snug font-bold italic tracking-tight">{selectedBeing.context}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-3 space-y-6">
                                        <h4 className="text-[10px] font-black text-amber-500 uppercase tracking-widest flex items-center gap-3">Biblical Documentation <div className="h-px flex-1 bg-amber-500/20" /></h4>
                                        {selectedBeing.scriptures.map((s, i) => (
                                            <div key={i} className="bg-white/5 border border-white/5 p-6 rounded-3xl group hover:bg-white/[0.08] transition-all">
                                                <div className="flex items-center gap-2 mb-3">
                                                    <Icon name="BookOpen" size={14} className="text-amber-500/50" />
                                                    <span className="text-xs font-black text-amber-500 tracking-wider uppercase">{s.ref}</span>
                                                </div>
                                                <p className="text-base italic text-slate-300 font-serif leading-relaxed">"{s.text}"</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Restored Full Schematic Overlay Modal */}
                        {isMapExpanded && (
                            <div className="fixed inset-0 z-[500] bg-[#020617]/90 backdrop-blur-3xl flex items-center justify-center p-8 animate-in fade-in duration-500 cursor-zoom-out" onClick={() => setIsMapExpanded(false)}>
                                <div className="absolute top-8 right-8 flex items-center gap-4 z-[510]">
                                    <div className="bg-slate-900/80 px-4 py-2 rounded-xl border border-white/10 text-xs font-black text-cyan-400 tracking-widest uppercase shadow-2xl">Schematic Full Mode</div>
                                    <button className="p-3 bg-white text-black rounded-full shadow-2xl hover:scale-110 transition-transform">
                                        <Icon name="X" size={24} />
                                    </button>
                                </div>
                                <img src={COURSE_DATA[0].image} alt="Full House Blueprint" className="max-w-full max-h-full object-contain animate-in zoom-in duration-500" />
                            </div>
                        )}

                        {/* Restored Unseen Realm Modal */}
                        {showUnseen && (
                            <div className="absolute inset-0 z-[200] bg-[#020617]/95 backdrop-blur-2xl flex items-center justify-center p-8 animate-in fade-in duration-500">
                                <div className="bg-[#020617] border-2 border-amber-500/30 rounded-[40px] p-10 max-w-6xl w-full relative shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                    <button onClick={() => setShowUnseen(false)} className="absolute top-8 right-8 p-3 bg-slate-900 rounded-full border border-white/10 text-white hover:bg-white hover:text-black transition-colors">
                                        <Icon name="X" size={16} />
                                    </button>
                                    <div className="flex flex-col items-center mb-10 shrink-0">
                                        <Icon name="Swords" size={56} className="text-amber-500 mb-3" />
                                        <h2 className="text-5xl font-black text-white italic tracking-tighter uppercase">THE UNSEEN REALM</h2>
                                        <p className="text-amber-500/60 font-black tracking-[0.3em] uppercase text-xs mt-2">Dimensional Conflict Interface</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-10 overflow-y-auto pr-3 custom-scrollbar flex-1">
                                        {Object.values(CROSS_CUTTING_DATA).map((theme, i) => (
                                            <div key={i} className="space-y-6 bg-white/5 p-8 rounded-[40px] border border-white/5 h-fit">
                                                <h3 className="text-3xl font-black text-amber-400 italic tracking-tighter uppercase leading-none">{theme.title}</h3>
                                                <p className="text-slate-100 text-xl leading-snug font-black italic tracking-tighter">{theme.concept}</p>
                                                <div className="space-y-4">
                                                    {theme.verses.map((v, vi) => (
                                                        <div key={vi} className="bg-black/60 p-5 rounded-2xl border border-white/5">
                                                            <span className="text-xs font-black text-amber-600 block mb-2 uppercase tracking-wider">{v.ref}</span>
                                                            <p className="text-base italic text-slate-300 font-serif leading-relaxed">"{v.text}"</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
