                                        {activeData.beings?.map((being, i) => (
                                            <button key={i} onClick={() => setSelectedBeing(being)}
                                                className="group flex items-center gap-1.5 px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold text-slate-400 uppercase tracking-wider hover:bg-cyan-500/20">
                                                <Search size={10} className="opacity-0 group-hover:opacity-100" />
                                                {being.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex-1 py-6 overflow-y-auto custom-scrollbar pr-2">
                                    <div className="grid grid-cols-2 lg:grid-cols-3 gap-5">
                                        {activeData.verses.map((v, i) => (
                                            <ScriptureCard key={i} verse={v} bgDark={activeData.bgDark || 'bg-slate-900/60'} border={activeData.border} />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Modal */}
                        {selectedBeing && (
                            <div className="fixed inset-0 z-[300] bg-black/80 backdrop-blur-xl flex items-center justify-center p-8">
                                <div className="bg-[#020617] border-2 border-cyan-500/30 rounded-[40px] p-10 max-w-2xl w-full relative max-h-[85vh] flex flex-col">
                                    <button onClick={() => setSelectedBeing(null)} className="absolute top-8 right-8 text-white hover:text-cyan-400">✕</button>
                                    <h2 className="text-3xl font-black text-white italic tracking-tighter uppercase mb-4">{selectedBeing.name}</h2>
                                    <div className="bg-cyan-500/5 border border-cyan-500/20 p-6 rounded-2xl mb-6">
                                        <p className="text-slate-100 text-lg leading-snug font-bold italic tracking-tight">{selectedBeing.context}</p>
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar space-y-4">
                                        {selectedBeing.scriptures.map((s, i) => (
                                            <div key={i} className="bg-white/5 p-4 rounded-xl">
                                                <span className="text-xs font-black text-amber-500 uppercase">{s.ref}</span>
                                                <p className="italic text-slate-300 mt-2 font-serif leading-relaxed">"{s.text}"</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
